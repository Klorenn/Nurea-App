          - img [ref=e471]
        - generic: Cada profesional presenta su colegiatura activa, documentos de identidad y referencias profesionales. Nuestro equipo clínico revisa manualmente cada caso antes de la incorporación a la red, y realiza revisiones periódicas cada seis meses.
      - generic [ref=e473] [cursor=pointer]:
        - generic [ref=e474]:
          - text: ¿Los pacientes pagan alguna comisión?
          - img [ref=e476]
        - generic: No. Los pacientes solo pagan la tarifa que el profesional ha definido, sin costos adicionales de plataforma ni suscripciones ocultas.
      - generic [ref=e478] [cursor=pointer]:
        - generic [ref=e479]:
          - text: ¿Qué pasa si necesito cancelar una cita?
          - img [ref=e481]
        - generic: Puedes cancelar hasta 24 horas antes sin coste alguno. Con menos de 24 horas, la política la define cada profesional y siempre es visible antes de reservar.
      - generic [ref=e483] [cursor=pointer]:
