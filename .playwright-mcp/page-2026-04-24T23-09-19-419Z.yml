          - text: ¿La información clínica está protegida?
          - img [ref=e486]
        - generic: Sí. Todas las conversaciones, notas y archivos están cifrados extremo a extremo. Cumplimos con RGPD y los estándares ISO 27001 y SOC 2 Tipo II.
      - generic [ref=e488] [cursor=pointer]:
        - generic [ref=e489]:
          - text: ¿Puedo ofrecer atención presencial además de online?
          - img [ref=e491]
